<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Atelye — Boshqaruv paneliga kirish</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#F5F5F9; --surface:#FFFFFF; --ink:#171521; --muted:#75717F;
    --accent:#6C2BD9; --accent-soft:#EFE6FF; --line:#ECEAF2;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;min-height:100vh;background:var(--bg);color:var(--ink);
    font-family:'Manrope',sans-serif;
    display:flex;align-items:center;justify-content:center;padding:24px;
  }
  .card{
    background:var(--surface);border-radius:22px;padding:34px 26px;
    width:100%;max-width:360px;
  }
  .logo{
    width:52px;height:52px;border-radius:14px;
    background:linear-gradient(135deg,var(--accent),#9B5DF0);
    display:flex;align-items:center;justify-content:center;
    color:#fff;font-weight:800;font-size:20px;margin:0 auto 16px;
  }
  h1{font-size:20px;font-weight:800;text-align:center;margin:0 0 4px;}
  .sub{text-align:center;color:var(--muted);font-size:14px;margin:0 0 24px;}
  .google-btn{
    width:100%;padding:13px;border-radius:12px;border:1px solid var(--line);
    background:#fff;font-family:'Manrope',sans-serif;font-size:15px;font-weight:700;
    display:flex;align-items:center;justify-content:center;gap:10px;cursor:pointer;
    color:var(--ink);text-decoration:none;
  }
  .divider{
    display:flex;align-items:center;gap:10px;color:var(--muted);
    font-size:13px;margin:20px 0;
  }
  .divider::before,.divider::after{content:"";flex:1;height:1px;background:var(--line);}
  input{
    width:100%;padding:12px 14px;border:1px solid var(--line);border-radius:12px;
    font-family:'Manrope',sans-serif;font-size:15px;margin-bottom:12px;background:var(--bg);
  }
  .login-btn{
    width:100%;padding:13px;border:none;border-radius:12px;
    background:var(--accent);color:#fff;font-family:'Manrope',sans-serif;
    font-size:15px;font-weight:700;cursor:pointer;
  }
  #err{color:#D42B4A;font-size:13.5px;text-align:center;min-height:18px;margin-top:10px;}
</style>
</head>
<body>
  <div class="card">
    <div class="logo">A</div>
    <h1>Boshqaruv paneli</h1>
    <p class="sub">Faqat egasi kira oladi</p>

    <a class="google-btn" href="/auth/google">
      <svg width="18" height="18" viewBox="0 0 18 18"><path fill="#4285F4" d="M17.64 9.2c0-.64-.06-1.25-.16-1.84H9v3.48h4.84a4.14 4.14 0 0 1-1.8 2.72v2.26h2.9c1.7-1.57 2.7-3.87 2.7-6.62z"/><path fill="#34A853" d="M9 18c2.43 0 4.47-.8 5.96-2.18l-2.9-2.26c-.8.54-1.84.86-3.06.86-2.35 0-4.34-1.59-5.05-3.72H.98v2.33A9 9 0 0 0 9 18z"/><path fill="#FBBC05" d="M3.95 10.7A5.4 5.4 0 0 1 3.68 9c0-.59.1-1.17.27-1.7V4.97H.98A9 9 0 0 0 0 9c0 1.45.35 2.83.98 4.03l2.97-2.33z"/><path fill="#EA4335" d="M9 3.58c1.32 0 2.51.45 3.44 1.35l2.58-2.58C13.46.9 11.43 0 9 0A9 9 0 0 0 .98 4.97l2.97 2.33C4.66 5.17 6.65 3.58 9 3.58z"/></svg>
      Google orqali kirish
    </a>

    <div class="divider">yoki</div>

    <form id="loginForm">
      <input type="email" id="email" placeholder="Email" required>
      <input type="password" id="password" placeholder="Parol" required>
      <button class="login-btn" type="submit">Kirish</button>
    </form>
    <div id="err"></div>
  </div>

<script>
  document.getElementById('loginForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const email = document.getElementById('email').value;
    const password = document.getElementById('password').value;
    const res = await fetch('/auth/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email, password }),
    });
    if (res.ok) {
      window.location.href = '/dashboard.html';
    } else {
      const data = await res.json();
      document.getElementById('err').textContent = data.error || 'Xatolik yuz berdi';
    }
  });
</script>
</body>
</html>
